# Infrastructure stack: Gateway (Traefik + Socket Proxy)
# Usage: docker compose -f docker-compose-infrastructure.yml up -d

########################### NETWORKS
networks:
  default:
    driver: bridge
  socket_proxy:
    name: socket_proxy
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.91.0/24
  t3_proxy:
    name: t3_proxy
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.90.0/24

########################### SECRETS
secrets:
  basic_auth_credentials:
    file: ${DOCKERDIR}/secrets/basic_auth_credentials
  cf_dns_api_token:
    file: ${DOCKERDIR}/secrets/cf_dns_api_token
  google_oauth_client_id:
    file: ${DOCKERDIR}/secrets/google_oauth_client_id
  google_oauth_client_secret:
    file: ${DOCKERDIR}/secrets/google_oauth_client_secret

########################### INCLUDES
include:
  - compose/infrastructure/socket-proxy.yml
  - compose/infrastructure/traefik.yml
  - compose/infrastructure/traefik-forward-auth.yml
  - compose/infrastructure/pihole.yml
