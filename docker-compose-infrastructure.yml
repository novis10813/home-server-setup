# Infrastructure stack: Gateway (Traefik + Socket Proxy)
# Usage: docker compose -f docker-compose-infrastructure.yml up -d

########################### NETWORKS
networks:
  default:
    driver: bridge
  socket_proxy:
    name: socket_proxy
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.91.0/24
  t3_proxy:
    name: t3_proxy
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.90.0/24
  ha_macvlan:
    name: ha_macvlan
    driver: macvlan
    driver_opts:
      parent: enp4s0
    ipam:
      config:
        - subnet: 192.168.0.0/24
          gateway: 192.168.0.1      # 路由器的 IP
          ip_range: 192.168.0.240/28

########################### SECRETS
secrets:
  basic_auth_credentials:
    file: ${DOCKERDIR}/secrets/basic_auth_credentials
  cf_dns_api_token:
    file: ${DOCKERDIR}/secrets/cf_dns_api_token
  google_oauth_client_id:
    file: ${DOCKERDIR}/secrets/google_oauth_client_id
  google_oauth_client_secret:
    file: ${DOCKERDIR}/secrets/google_oauth_client_secret
  grafana_admin_password:
    file: ${DOCKERDIR}/secrets/grafana_admin_password

########################### INCLUDES
include:
  - compose/infrastructure/socket-proxy.yml
  - compose/infrastructure/traefik.yml
  - compose/infrastructure/traefik-forward-auth.yml
  - compose/infrastructure/pihole.yml
  # Monitoring (profile: monitor)
  - compose/infrastructure/prometheus.yml
  - compose/infrastructure/alertmanager.yml
  - compose/infrastructure/grafana.yml
  - compose/infrastructure/loki.yml
  - compose/infrastructure/promtail.yml
  - compose/infrastructure/node-exporter.yml
  - compose/infrastructure/cadvisor.yml
