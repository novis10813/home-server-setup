name: Render diagrams

on:
  push:
    branches:
      - main
    paths:
      - "docs/diagrams/*.d2"
      - ".github/workflows/render-diagrams.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Render D2 diagrams to SVG
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD/docs/diagrams:/work" \
            terrastruct/d2:v0.7.1 \
            --layout elk \
            --pad 40 \
            /work/home-server-overview.d2 \
            /work/home-server-overview.svg

      - name: Install SVG rasterizer
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Rasterize SVG diagrams to PNG
        run: |
          rsvg-convert \
            -z 2 \
            docs/diagrams/home-server-overview.svg \
            -o docs/diagrams/home-server-overview.png

      - name: Commit rendered diagrams
        run: |
          if git diff --quiet -- docs/diagrams/*.svg docs/diagrams/*.png; then
            echo "No rendered diagram changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/diagrams/*.svg docs/diagrams/*.png
          git commit -m "docs: render diagrams [skip ci]"
          git push
