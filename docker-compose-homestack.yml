# Home stack: 自訂義應用服務
# Usage: docker compose -f docker-compose-homestack.yml up -d

########################### NETWORKS
networks:
  t3_proxy:
    name: t3_proxy
    external: true
  homestack:
    name: homestack
    driver: bridge

########################### INCLUDES
include:
  - compose/homestack/nats.yml
  - compose/homestack/redis.yml
  - compose/homestack/crypto-relay.yml
  - compose/homestack/financial-dashboard.yml
  - compose/homestack/questdb.yml
  - compose/homestack/market-data-recorder.yml
  - compose/homestack/market-data-archiver.yml
  - compose/homestack/nautilus-catalog-builder.yml
