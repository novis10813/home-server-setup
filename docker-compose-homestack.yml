# Home stack: 自訂義應用服務
# Usage: docker compose -f docker-compose-homestack.yml up -d

########################### NETWORKS
networks:
  t3_proxy:
    name: t3_proxy
    external: true
  homestack:
    name: homestack
    driver: bridge

########################### INCLUDES
include:
  - compose/homestack/nats.yml
  - compose/homestack/crypto-relay.yml
