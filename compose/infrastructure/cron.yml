# Cron Scheduler - runs crond inside alpine container to trigger docker API actions securely via socket-proxy

services:
  cron:
    container_name: cron
    image: alpine:latest
    profiles:
      - all
      - network
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    depends_on:
      - socket-proxy
    networks:
      - socket_proxy
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro
      - ${DOCKERDIR}/appdata/cron/crontab:/config/crontab:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp /config/crontab /etc/crontabs/root
        chown root:root /etc/crontabs/root
        chmod 600 /etc/crontabs/root
        exec crond -f -d 8
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.1"
