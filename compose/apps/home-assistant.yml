# Home Assistant - Home automation
# https://www.home-assistant.io/installation/linux#install-home-assistant-container
# Default: bridge network; for mDNS/Bluetooth discovery see docs/app/home-assistant.md (host mode)

services:
  ###########################################################################
  # Home Assistant
  ###########################################################################
  home-assistant:
    container_name: home-assistant
    image: ghcr.io/home-assistant/home-assistant:${HOMEASSISTANT_VERSION:-2026.4.4}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${DATADIR}/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ}

    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      t3_proxy: {}
      ha_macvlan:
        ipv4_address: 192.168.0.250 # 給 Home Assistant 使用的 IP
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ha-rtr.entrypoints=websecure-internal"
      - "traefik.http.routers.ha-rtr.rule=Host(`ha.${DOMAINNAME_1}`)"
      - "traefik.http.routers.ha-rtr.middlewares=chain-no-auth@file"
      - "traefik.http.routers.ha-rtr.service=ha-svc"
      - "traefik.http.services.ha-svc.loadbalancer.server.port=8123"

networks:
  t3_proxy:
    external: true
  ha_macvlan:
    external: true