# Calibre-Web - Web-based eBook reader and management
# https://github.com/linuxserver/docker-calibre-web

services:
  ###########################################################################
  # Calibre-Web
  ###########################################################################
  calibre-web:
    container_name: calibre-web
    image: lscr.io/linuxserver/calibre-web:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - t3_proxy
    volumes:
      - ${DATADIR}/calibre/calibre-web-config:/config
      - ${DATADIR}/calibre/books:/books
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ}
      - DOCKER_MODS=linuxserver/mods:calibre-web-update-calibre
    labels:
      - "traefik.enable=true"
      ## HTTP Router
      - "traefik.http.routers.calibre-web-rtr-http.entrypoints=web-internal"
      - "traefik.http.routers.calibre-web-rtr-http.rule=Host(`calibre.${DOMAINNAME_1}`)"
      - "traefik.http.routers.calibre-web-rtr-http.middlewares=chain-no-auth@file"
      ## HTTPS Router
      - "traefik.http.routers.calibre-web-rtr.entrypoints=websecure-internal"
      - "traefik.http.routers.calibre-web-rtr.rule=Host(`calibre.${DOMAINNAME_1}`)"
      - "traefik.http.routers.calibre-web-rtr.middlewares=chain-no-auth@file"
      ## Service
      - "traefik.http.routers.calibre-web-rtr.service=calibre-web-svc"
      - "traefik.http.services.calibre-web-svc.loadbalancer.server.port=8083"
