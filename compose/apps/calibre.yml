# Calibre - eBook management GUI (via KasmVNC web interface)
# https://github.com/linuxserver/docker-calibre

services:
  ###########################################################################
  # Calibre
  ###########################################################################
  calibre:
    container_name: calibre
    image: lscr.io/linuxserver/calibre:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - t3_proxy
    volumes:
      - ${DATADIR}/calibre/config:/config
      - ${DATADIR}/calibre/books:/books
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ}
    labels:
      - "traefik.enable=true"
      ## HTTP Router
      - "traefik.http.routers.calibre-rtr-http.entrypoints=web-internal"
      - "traefik.http.routers.calibre-rtr-http.rule=Host(`calibre-gui.${DOMAINNAME_1}`)"
      - "traefik.http.routers.calibre-rtr-http.middlewares=chain-no-auth@file"
      ## HTTPS Router
      - "traefik.http.routers.calibre-rtr.entrypoints=websecure-internal"
      - "traefik.http.routers.calibre-rtr.rule=Host(`calibre-gui.${DOMAINNAME_1}`)"
      - "traefik.http.routers.calibre-rtr.middlewares=chain-no-auth@file"
      ## Service
      - "traefik.http.routers.calibre-rtr.service=calibre-svc"
      - "traefik.http.services.calibre-svc.loadbalancer.server.port=8080"
