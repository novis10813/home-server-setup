# Minecraft Java Edition - Fabric server（原味生存 + 伺服器端效能模組）
# Image: https://github.com/itzg/docker-minecraft-server
# 遊戲連線埠：25565（TCP），不需經 Traefik

services:
  ###########################################################################
  # Minecraft Server
  ###########################################################################
  minecraft:
    container_name: minecraft
    image: itzg/minecraft-server:${MINECRAFT_IMAGE_TAG:-latest}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tty: true
    stdin_open: true
    networks:
      - t3_proxy
    # ports removed to use Traefik
    volumes:
      - ${DATADIR}/minecraft:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ}
      - EULA=TRUE
      - VERSION=${MINECRAFT_VERSION:-1.21.4}
      - TYPE=${MINECRAFT_TYPE:-FABRIC}
      - MEMORY=${MINECRAFT_MEMORY:-2G}
      - MODRINTH_PROJECTS=${MINECRAFT_MODRINTH_MODS:-fabric-api,lithium,ferrite-core,krypton,c2me-fabric,carpet,servercore,chunky,bar,fabric-language-kotlin,simple-voice-chat}
    labels:
      - "traefik.enable=true"
      # TCP Router for Minecraft (Server supports no SNI, so we use HostSNI(`*`))
      - "traefik.tcp.routers.minecraft-rtr.entrypoints=minecraft"
      - "traefik.tcp.routers.minecraft-rtr.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.minecraft-rtr.service=minecraft-svc"
      - "traefik.tcp.services.minecraft-svc.loadbalancer.server.port=25565"
      # UDP Router for Voice Chat (if used)
      - "traefik.udp.routers.minecraft-voice-rtr.entrypoints=voicechat"
      - "traefik.udp.routers.minecraft-voice-rtr.service=minecraft-voice-svc"
      - "traefik.udp.services.minecraft-voice-svc.loadbalancer.server.port=24454"

networks:
  t3_proxy:
    external: true
