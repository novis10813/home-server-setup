# Minecraft Java Edition - Velocity proxy + Fabric backend
# Images:
#   - Proxy:   https://github.com/itzg/docker-mc-proxy
#   - Backend: https://github.com/itzg/docker-minecraft-server
# 架構：
#   玩家 (TCP 25565) -> Traefik -> Velocity (online-mode=true, modern forwarding)
#                                     -> Fabric backend (online-mode=false, FabricProxy-Lite)
#   語音  (UDP 25577) -> Traefik -> Velocity (voicechat plugin) -> Fabric backend
# 後端不對外暴露：對玩家流量僅走 minecraft_internal，另保留一般 bridge 網路供啟動時下載依賴。

services:
  ###########################################################################
  # Velocity Proxy - 玩家正版驗證入口
  ###########################################################################
  minecraft-velocity:
    container_name: minecraft-velocity
    image: itzg/mc-proxy:${VELOCITY_IMAGE_TAG:-latest}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tty: true
    stdin_open: true
    depends_on:
      - minecraft
    networks:
      - t3_proxy
      - minecraft_internal
    volumes:
      - ${DATADIR}/velocity:/server
      - ${DOCKERDIR}/appdata/velocity/velocity.toml:/server/velocity.toml
      # forwarding.secret 以 bind mount 提供：itzg/mc-proxy 的 init 會 chown，
      # 因此不能用 docker secret（RO tmpfs）。檔案需 chmod 600 + 包含 root 可讀。
      - ${DOCKERDIR}/secrets/velocity_forwarding_secret:/server/forwarding.secret
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ}
      - TYPE=VELOCITY
      - VELOCITY_VERSION=${VELOCITY_VERSION:-latest}
      - MEMORY=${VELOCITY_MEMORY:-512M}
      # MOTD/icon 由 MiniMOTD-Velocity 接管；server-list ping 不再透傳到後端，
      # pause-when-empty 維持有效。
      # MODRINTH_PROJECTS 需要 MINECRAFT_VERSION 用於相容性篩選（Velocity plugin 通常版本中立）
      - MINECRAFT_VERSION=${MINECRAFT_VERSION:-1.21.11}
      - MODRINTH_PROJECTS=${VELOCITY_MODRINTH_PLUGINS:-minimotd,simple-voice-chat:alpha}
    deploy:
      resources:
        limits:
          memory: ${VELOCITY_MEMORY_LIMIT:-768m}
          cpus: "${VELOCITY_CPU_LIMIT:-1.0}"
    labels:
      - "traefik.enable=true"
      # TCP Router for Minecraft (HostSNI(`*`) - 玩家連線統一進 Velocity)
      - "traefik.tcp.routers.minecraft-rtr.entrypoints=minecraft"
      - "traefik.tcp.routers.minecraft-rtr.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.minecraft-rtr.service=minecraft-svc"
      - "traefik.tcp.services.minecraft-svc.loadbalancer.server.port=25577"
      # UDP Router for Simple Voice Chat - 由 Velocity plugin 接收後再轉發到後端
      - "traefik.udp.routers.minecraft-voice-rtr.entrypoints=voicechat"
      - "traefik.udp.routers.minecraft-voice-rtr.service=minecraft-voice-svc"
      - "traefik.udp.services.minecraft-voice-svc.loadbalancer.server.port=25577"

  ###########################################################################
  # Minecraft Fabric Backend - 離線模式，僅接受 Velocity 轉發或內部網路連線
  ###########################################################################
  minecraft:
    container_name: minecraft
    image: itzg/minecraft-server:${MINECRAFT_IMAGE_TAG:-latest}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tty: true
    stdin_open: true
    networks:
      - t3_proxy
      - minecraft_internal # Velocity 與後端 TCP 通道；未來 bot 容器加入此網路
    volumes:
      - ${DATADIR}/minecraft:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ}
      - EULA=TRUE
      - VERSION=${MINECRAFT_VERSION:-1.21.11}
      - TYPE=${MINECRAFT_TYPE:-FABRIC}
      - MEMORY=${MINECRAFT_MEMORY:-2G}
      # 後端強制離線；正版驗證由 Velocity 處理，
      # 未攜帶 forwarding secret 的直連會被 FabricProxy-Lite 拒絕。
      - ONLINE_MODE=FALSE
      - ENFORCE_SECURE_PROFILE=FALSE
      # minimotd 已移到 Velocity 端，後端不再安裝（避免兩邊維護兩份設定）
      - MODRINTH_PROJECTS=${MINECRAFT_MODRINTH_MODS:-fabric-api,lithium,ferrite-core,krypton,c2me-fabric,carpet,servux,servercore,bar,fabric-language-kotlin,simple-voice-chat,polysit,polymer,scalablelux,voxy:alpha,voxy-worldgen,voxyserver:1.1.4,sodium,syncmatica,craterlib,sdlink,tabtps,ledger,luckperms,fabricproxy-lite}
networks:
  t3_proxy:
    external: true
  minecraft_internal:
    name: minecraft_internal
    driver: bridge
    internal: true
