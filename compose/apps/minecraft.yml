# Minecraft Java Edition - Fabric serverпјҲеҺҹе‘із”ҹеӯҳ + дјәжңҚеҷЁз«Ҝж•ҲиғҪжЁЎзө„пјү
# Image: https://github.com/itzg/docker-minecraft-server
# йҒҠжҲІйҖЈз·ҡеҹ пјҡ25565пјҲTCPпјүпјҢдёҚйңҖз¶“ Traefik

services:
  ###########################################################################
  # Minecraft Server
  ###########################################################################
  minecraft:
    container_name: minecraft
    image: itzg/minecraft-server:${MINECRAFT_IMAGE_TAG:-latest}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tty: true
    stdin_open: true
    networks:
      - default
    ports:
      - "${MINECRAFT_PORT:-25565}:25565"
      - "${VOICE_CHAT_PORT:-24454}:24454"
    volumes:
      - ${DATADIR}/minecraft:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ}
      - EULA=TRUE
      - VERSION=${MINECRAFT_VERSION:-1.21.4}
      - TYPE=${MINECRAFT_TYPE:-FABRIC}
      - MEMORY=${MINECRAFT_MEMORY:-2G}
      - MODRINTH_PROJECTS=${MINECRAFT_MODRINTH_MODS:-fabric-api,lithium,ferrite-core,krypton,c2me-fabric,carpet,servercore,chunky,bar,fabric-language-kotlin,simple-voice-chat}
