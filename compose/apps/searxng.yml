# SearXNG - Privacy-respecting metasearch engine
# https://docs.searxng.org/admin/installation-docker.html
# Internal network only, no auth - for AI agent access

services:
  ###########################################################################
  # SearXNG
  ###########################################################################
  searxng:
    container_name: searxng
    image: searxng/searxng:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${DOCKERDIR}/appdata/searxng:/etc/searxng:rw
      - ${DOCKERDIR}/appdata/searxng/wikidata.py:/usr/local/searxng/searx/engines/wikidata.py:ro
      - ${DOCKERDIR}/appdata/searxng/engines_cache:/usr/local/searxng/searx/engines/__pycache__:rw
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ}
      - SEARXNG_BASE_URL=https://search.${DOMAINNAME_1}/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      t3_proxy: {}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.searxng-rtr.entrypoints=websecure-internal"
      - "traefik.http.routers.searxng-rtr.rule=Host(`search.${DOMAINNAME_1}`)"
      - "traefik.http.routers.searxng-rtr.middlewares=chain-no-auth@file"
      - "traefik.http.routers.searxng-rtr.service=searxng-svc"
      - "traefik.http.services.searxng-svc.loadbalancer.server.port=8080"

networks:
  t3_proxy:
    external: true
