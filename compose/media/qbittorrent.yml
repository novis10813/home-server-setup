# qBittorrent - BitTorrent download client
# https://docs.linuxserver.io/images/docker-qbittorrent/

services:
  qbittorrent:
    container_name: qbittorrent
    image: lscr.io/linuxserver/qbittorrent:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - default
      - t3_proxy
    ports:
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - ${DATADIR}/qbittorrent:/config
      - ${DATADIR}/media/downloads:/data/media/downloads
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    labels:
      - "traefik.enable=true"
      ## HTTP Router
      - "traefik.http.routers.qbittorrent-rtr-http.entrypoints=web-internal"
      - "traefik.http.routers.qbittorrent-rtr-http.rule=Host(`qbittorrent.${DOMAINNAME_1}`)"
      - "traefik.http.routers.qbittorrent-rtr-http.middlewares=chain-no-auth@file"
      ## HTTPS Router
      - "traefik.http.routers.qbittorrent-rtr.entrypoints=websecure-internal"
      - "traefik.http.routers.qbittorrent-rtr.rule=Host(`qbittorrent.${DOMAINNAME_1}`)"
      - "traefik.http.routers.qbittorrent-rtr.middlewares=chain-no-auth@file"
      ## Service
      - "traefik.http.routers.qbittorrent-rtr.service=qbittorrent-svc"
      - "traefik.http.services.qbittorrent-svc.loadbalancer.server.port=8080"
