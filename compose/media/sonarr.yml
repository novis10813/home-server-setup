# Sonarr - TV series & anime management
# https://docs.linuxserver.io/images/docker-sonarr/

services:
  sonarr:
    container_name: sonarr
    image: lscr.io/linuxserver/sonarr:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - default
      - t3_proxy
    volumes:
      - ${DATADIR}/sonarr:/config
      - ${DATADIR}/media:/data/media
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ}
    labels:
      - "traefik.enable=true"
      ## HTTP Router
      - "traefik.http.routers.sonarr-rtr-http.entrypoints=web-internal"
      - "traefik.http.routers.sonarr-rtr-http.rule=Host(`sonarr.${DOMAINNAME_1}`)"
      - "traefik.http.routers.sonarr-rtr-http.middlewares=chain-no-auth@file"
      ## HTTPS Router
      - "traefik.http.routers.sonarr-rtr.entrypoints=websecure-internal"
      - "traefik.http.routers.sonarr-rtr.rule=Host(`sonarr.${DOMAINNAME_1}`)"
      - "traefik.http.routers.sonarr-rtr.middlewares=chain-no-auth@file"
      ## Service
      - "traefik.http.routers.sonarr-rtr.service=sonarr-svc"
      - "traefik.http.services.sonarr-svc.loadbalancer.server.port=8989"
