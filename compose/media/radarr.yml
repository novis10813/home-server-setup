# Radarr - Movie management (including anime movies)
# https://docs.linuxserver.io/images/docker-radarr/

services:
  radarr:
    container_name: radarr
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - default
      - t3_proxy
    volumes:
      - ${DATADIR}/radarr:/config
      - ${DATADIR}/media:/data/media
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ}
    labels:
      - "traefik.enable=true"
      ## HTTP Router
      - "traefik.http.routers.radarr-rtr-http.entrypoints=web-internal"
      - "traefik.http.routers.radarr-rtr-http.rule=Host(`radarr.${DOMAINNAME_1}`)"
      - "traefik.http.routers.radarr-rtr-http.middlewares=chain-no-auth@file"
      ## HTTPS Router
      - "traefik.http.routers.radarr-rtr.entrypoints=websecure-internal"
      - "traefik.http.routers.radarr-rtr.rule=Host(`radarr.${DOMAINNAME_1}`)"
      - "traefik.http.routers.radarr-rtr.middlewares=chain-no-auth@file"
      ## Service
      - "traefik.http.routers.radarr-rtr.service=radarr-svc"
      - "traefik.http.services.radarr-svc.loadbalancer.server.port=7878"
