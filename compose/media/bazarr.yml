# Bazarr - Subtitle management companion for Sonarr/Radarr
# https://docs.linuxserver.io/images/docker-bazarr/

services:
  bazarr:
    container_name: bazarr
    image: lscr.io/linuxserver/bazarr:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - default
      - t3_proxy
    volumes:
      - ${DATADIR}/bazarr:/config
      - ${DATADIR}/media:/data/media
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ}
    labels:
      - "traefik.enable=true"
      ## HTTP Router
      - "traefik.http.routers.bazarr-rtr-http.entrypoints=web-internal"
      - "traefik.http.routers.bazarr-rtr-http.rule=Host(`bazarr.${DOMAINNAME_1}`)"
      - "traefik.http.routers.bazarr-rtr-http.middlewares=chain-no-auth@file"
      ## HTTPS Router
      - "traefik.http.routers.bazarr-rtr.entrypoints=websecure-internal"
      - "traefik.http.routers.bazarr-rtr.rule=Host(`bazarr.${DOMAINNAME_1}`)"
      - "traefik.http.routers.bazarr-rtr.middlewares=chain-no-auth@file"
      ## Service
      - "traefik.http.routers.bazarr-rtr.service=bazarr-svc"
      - "traefik.http.services.bazarr-svc.loadbalancer.server.port=6767"
