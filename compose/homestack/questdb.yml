# QuestDB — Time-series database for market data
# HTTP REST + ILP: port 9000 | TCP ILP: port 9009

services:
  questdb:
    container_name: questdb
    image: questdb/questdb:${QUESTDB_VERSION:-8.2.1}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - t3_proxy    # Traefik reverse proxy
      - homestack   # market-data-recorder ILP 寫入
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.questdb-rtr.entrypoints=websecure-internal"
      - "traefik.http.routers.questdb-rtr.rule=Host(`questdb.${DOMAINNAME_1}`)"
      - "traefik.http.routers.questdb-rtr.middlewares=chain-oauth@file"
      - "traefik.http.routers.questdb-rtr.service=questdb-svc"
      - "traefik.http.services.questdb-svc.loadbalancer.server.port=9000"
    volumes:
      - ${DOCKERDIR}/appdata/questdb/server.ini:/var/lib/questdb/conf/server.ini:ro
      - ${DATADIR}/questdb:/var/lib/questdb/db
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ:-UTC}
    deploy:
      resources:
        limits:
          memory: 2g
          # 提高 CPU 上限以降低 CFS 節流（cAdvisor throttled periods）
          cpus: "${QUESTDB_CPU_LIMIT:-4.0}"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET / HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q HTTP"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

networks:
  t3_proxy:
    external: true
  homestack:
    external: true
