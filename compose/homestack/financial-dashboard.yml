# Financial Dashboard — SolidJS orderbook monitoring dashboard
# Source: /mnt/raid1/novis/home-stack/financial-dashboard

services:
  financial-dashboard:
    container_name: financial-dashboard
    build:
      context: /mnt/raid1/novis/home-stack/financial-dashboard
      dockerfile: Dockerfile
      args:
        VITE_NATS_WS_URL: wss://nats-ws.${DOMAINNAME_1}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - t3_proxy
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ:-UTC}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dash-rtr.entrypoints=websecure-internal"
      - "traefik.http.routers.dash-rtr.rule=Host(`dash.${DOMAINNAME_1}`)"
      - "traefik.http.routers.dash-rtr.middlewares=chain-oauth@file"
      - "traefik.http.routers.dash-rtr.service=dash-svc"
      - "traefik.http.services.dash-svc.loadbalancer.server.port=80"

  dashboard-api:
    container_name: dashboard-api
    build:
      context: /mnt/raid1/novis/home-stack/financial-dashboard/api
      dockerfile: Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - t3_proxy
      - homestack
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DATADIR}/dashboard-api:/data
    environment:
      - TZ=${TZ:-UTC}
      - DB_PATH=/data/config.db
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - BOOKMAP_CACHE_TTL_SEC=900
      - BOOKMAP_CACHE_COLUMNS=900
      - BOOKMAP_CACHE_SAMPLE_MS=1000

networks:
  t3_proxy:
    external: true
  homestack:
    external: true
