# NATS — HomeStack。Compose 請掛載本檔為 /nats-server.conf（include 才會正確解析 /run/secrets/nats_auth）。
# Ref: https://docs.nats.io/running-a-nats-service/configuration

# 單機 JetStream：請勿加 cluster {}（未設 routes 會觸發 JetStream cluster 錯誤）。真要 N 節點再補 cluster + routes。
server_name: homestack

port: 4222
http_port: 8222

jetstream {
  store_dir: "/data"
  max_mem: 1Gb
  max_file: 10Gb
}

# 帳號密碼：${DOCKERDIR}/secrets/nats_auth.conf（勿提交版控）
include "/run/secrets/nats_auth"
