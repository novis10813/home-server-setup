# Prometheus Configuration
# Ref: https://prometheus.io/docs/prometheus/latest/configuration/configuration/

global:
  scrape_interval: 15s      # 預設抓取間隔
  evaluation_interval: 15s  # 規則評估間隔
  scrape_timeout: 10s       # 抓取逾時

# Alertmanager 設定 (未來擴充用)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# 規則檔案 (未來擴充用)
# rule_files:
#   - /etc/prometheus/rules/*.yml

# 抓取設定
scrape_configs:
  # Prometheus 自身監控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # Traefik 監控 (需在 Traefik 啟用 metrics)
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']
        labels:
          instance: 'traefik'

  # Node Exporter - 主機層級指標 (CPU, RAM, Disk, Network)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'homeserver'

  # cAdvisor - 容器層級指標
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          instance: 'homeserver'
