# Traefik Alert Rules
# 反向代理與 HTTP 服務監控告警

groups:
  - name: traefik-alerts
    rules:
      ### Traefik 服務狀態
      - alert: TraefikDown
        expr: up{job="traefik"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Traefik is down"
          description: "Traefik reverse proxy is not responding. All services may be inaccessible."

      ### HTTP 錯誤率告警
      - alert: TraefikHighHttp5xxRate
        expr: |
          sum(rate(traefik_service_requests_total{code=~"5.."}[5m])) by (service) 
          / sum(rate(traefik_service_requests_total[5m])) by (service) * 100 > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate for {{ $labels.service }}"
          description: "Service {{ $labels.service }} has {{ printf \"%.1f\" $value }}% 5xx errors."

      - alert: TraefikHighHttp4xxRate
        expr: |
          sum(rate(traefik_service_requests_total{code=~"4.."}[5m])) by (service) 
          / sum(rate(traefik_service_requests_total[5m])) by (service) * 100 > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 4xx error rate for {{ $labels.service }}"
          description: "Service {{ $labels.service }} has {{ printf \"%.1f\" $value }}% 4xx errors."

      ### 延遲告警
      # 排除 Home Assistant (ha-svc)：SSE / 長輪詢 / 重儀表板使 p95 常 >2s，與代理本身品質關聯低。
      - alert: TraefikHighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(traefik_service_request_duration_seconds_bucket{service!="ha-svc@docker"}[5m])) by (le, service)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency for {{ $labels.service }}"
          description: "Service {{ $labels.service }} p95 latency is {{ printf \"%.2f\" $value }}s."

      ### 連線數告警
      - alert: TraefikHighOpenConnections
        expr: sum(traefik_service_open_connections) by (service) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High open connections for {{ $labels.service }}"
          description: "Service {{ $labels.service }} has {{ printf \"%.0f\" $value }} open connections."

      ### TLS 憑證告警
      - alert: TraefikTLSCertExpiringSoon
        expr: (traefik_tls_certs_not_after - time()) / 86400 < 14
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "TLS certificate expiring soon"
          description: "TLS certificate for {{ $labels.cn }} expires in {{ printf \"%.0f\" $value }} days."

      - alert: TraefikTLSCertExpiringSoonCritical
        expr: (traefik_tls_certs_not_after - time()) / 86400 < 7
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "TLS certificate expiring very soon"
          description: "TLS certificate for {{ $labels.cn }} expires in {{ printf \"%.0f\" $value }} days!"

      ### 後端健康檢查
      - alert: TraefikServiceDown
        expr: traefik_service_server_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Traefik backend {{ $labels.service }} is down"
          description: "Backend server for {{ $labels.service }} is not responding."
